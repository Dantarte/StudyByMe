        :root { 
            --bg: #000; --app-bg: #1e1e1e; --text: #abb2bf;
            --blue: #61afef; --green: #98c379; --red: #e06c75; --border: #333;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif;

        }

        /* 1. 顶部导航 - 固定 */
        header {
            padding-top: calc(var(--safe-top) + 15px);
            padding-left: 20px; padding-right: 20px; padding-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .menu-icon { font-size: 1.5rem; color: var(--text); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }

        /* 2. 侧边菜单 */
        .side-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 5000; display: none; flex-direction: column; padding: 80px 30px;
        }
        .side-panel.active { display: flex; }
        .panel-item { 
            padding: 22px 0; border-bottom: 1px solid var(--border);
            font-size: 1.1rem; color: #fff; display: flex; justify-content: space-between; align-items: center;
        }
        .panel-item.active { color: var(--blue); font-weight: bold; }
        .close-btn { position: absolute; top: calc(var(--safe-top) + 20px); right: 25px; font-size: 2rem; color: #5c6370; }

        /* 3. 练习核心区 - 可滚动 */
        #main-scroll { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; position: relative;
        }
        #word-text { font-size: 2.2rem; font-weight: 200; color: #fff; text-align: center; margin: 40px 0 10px; line-height: 1.2; }
        #hint-text { font-size: 0.7rem; color: #5c6370; text-align: center; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }

        .opts-grid { display: grid; gap: 12px; width: 100%; margin-bottom: 40px; }
        button.choice { 
            background: var(--app-bg); color: var(--text); border: 1px solid var(--border); 
            padding: 22px 18px; font-size: 1.05rem; border-radius: 12px; text-align: left;
        }
        button.choice.correct { background: var(--green) !important; color: #000 !important; font-weight: bold; }

            flex-shrink: 0;

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mastery V28 - Pro</title>
    <style>
        :root { 
            --bg: #000; --app-bg: #1e1e1e; --text: #abb2bf;
            --blue: #61afef; --green: #98c379; --red: #e06c75; --border: #333;
            --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 顶部导航 */
        header {
            padding-top: calc(var(--safe-top) + 15px);
            padding-left: 20px; padding-right: 20px; padding-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .menu-icon { font-size: 1.4rem; color: var(--text); padding: 5px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }

        /* 侧边弹出菜单 */
        .side-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 5000; display: none; flex-direction: column;
            padding: 80px 30px;
        }
        .side-panel.active { display: flex; }
        .panel-item { 
            padding: 22px 0; border-bottom: 1px solid var(--border);
            font-size: 1.1rem; color: #fff; display: flex; justify-content: space-between; align-items: center;
        }
        .panel-item.active { color: var(--blue); }
        .close-btn { position: absolute; top: calc(var(--safe-top) + 20px); right: 25px; font-size: 1.8rem; color: #5c6370; }

        /* 导入中心 (默认显示) */
        #import-center { 
            position: fixed; inset: 0; background: var(--bg); 
            z-index: 3000; padding: 25px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .card { width: 100%; max-width: 450px; background: var(--app-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        textarea { width: 100%; height: 150px; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 1rem; }
        .btn-main { background: var(--blue); color: #000; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 1rem; }
        .file-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }

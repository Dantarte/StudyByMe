<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mastery V28 - Pro</title>
    <style>
        :root { 
            --bg: #000; --app-bg: #1e1e1e; --text: #abb2bf;
            --blue: #61afef; --green: #98c379; --red: #e06c75; --border: #333;
            --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 顶部导航 */
        header {
            padding-top: calc(var(--safe-top) + 15px);
            padding-left: 20px; padding-right: 20px; padding-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .menu-icon { font-size: 1.4rem; color: var(--text); padding: 5px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }

        /* 侧边弹出菜单 */
        .side-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 5000; display: none; flex-direction: column;
            padding: 80px 30px;
        }
        .side-panel.active { display: flex; }
        .panel-item { 
            padding: 22px 0; border-bottom: 1px solid var(--border);
            font-size: 1.1rem; color: #fff; display: flex; justify-content: space-between; align-items: center;
        }
        .panel-item.active { color: var(--blue); }
        .close-btn { position: absolute; top: calc(var(--safe-top) + 20px); right: 25px; font-size: 1.8rem; color: #5c6370; }

        /* 导入中心 (默认显示) */
        #import-center { 
            position: fixed; inset: 0; background: var(--bg); 
            z-index: 3000; padding: 25px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .card { width: 100%; max-width: 450px; background: var(--app-bg); padding: 25px; border-radius: 15px; border: 1px solid var(--border); text-align: center; }
        textarea { width: 100%; height: 150px; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 1rem; }
        .btn-main { background: var(--blue); color: #000; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 1rem; }
        .file-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }
        .btn-sec { background: #333; color: #fff; border: none; padding: 15px; border-radius: 10px; font-size: 0.85rem; text-align: center; }

        /* 主学习区 */
        #app { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; visibility: hidden; }
        #word-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #word-text { font-size: 2.2rem; font-weight: 200; color: #fff; text-align: center; margin-bottom: 10px; line-height: 1.2; }
        #hint-text { font-size: 0.75rem; color: #5c6370; letter-spacing: 3px; text-transform: uppercase; }

        .opts-grid { display: grid; gap: 12px; margin-bottom: 30px; }
        button.choice { background: var(--app-bg); color: var(--text); border: 1px solid var(--border); padding: 22px 18px; font-size: 1.05rem; border-radius: 14px; text-align: left; }
        button.choice.correct { background: var(--green) !important; color: #000 !important; font-weight: bold; }
        #spell-box { background: rgba(0,0,0,0.5); border: none; border-bottom: 2px solid var(--blue); color: #fff; font-size: 1.8rem; text-align: center; width: 100%; padding: 15px 0; display: none; margin-bottom: 40px; }

        .progress { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #111; }
        #bar-fill { height: 100%; background: var(--blue); width: 0%; transition: 0.5s; }

        .modal-full { position: fixed; inset: 0; background: var(--bg); z-index: 6000; display: none; flex-direction: column; padding: 60px 20px; overflow-y: auto; }
        .list-row { padding: 18px 0; border-bottom: 1px solid var(--border); }
        .list-row b { display: block; color: var(--blue); margin-bottom: 5px; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <div class="menu-icon" onclick="openPanel('left')">☰</div>
    <div style="font-size: 0.7rem; letter-spacing: 2px; color: var(--blue);">MASTER PRO V28</div>
    <div class="menu-icon" onclick="openPanel('right')">📂</div>
</header>

<div id="panel-left" class="side-panel">
    <div class="close-btn" onclick="closePanel('left')">✕</div>
    <h3 style="color:var(--blue); font-weight: 200; margin-bottom: 30px;">LEARNING MODE</h3>
    <div class="panel-item" onclick="setCircle(1)" id="m1">Circle 1: 识别识别</div>
    <div class="panel-item" onclick="setCircle(2)" id="m2">Circle 2: 回想回想</div>
    <div class="panel-item" onclick="setCircle(3)" id="m3">Circle 3: 拼写拼写</div>
    <div class="panel-item" onclick="toggleRandom()">随机练习模式 <span id="rand-status" style="color:var(--blue)">OFF</span></div>
</div>

<div id="panel-right" class="side-panel">
    <div class="close-btn" onclick="closePanel('right')">✕</div>
    <h3 style="color:var(--blue); font-weight: 200; margin-bottom: 30px;">RESOURCES</h3>
    <div class="panel-item" onclick="showList('all')">全量词库清单</div>
    <div class="panel-item" onclick="showList('arc')">查看已归档词汇</div>
    <div class="panel-item" onclick="resetApp()" style="color:var(--red); border:none; margin-top:50px;">重置所有数据 ⚠</div>
</div>

<div id="import-center">
    <div class="card">
        <h2 style="font-weight: 200; margin-bottom: 20px;">DATA <span style="color:var(--blue)">MASTER</span></h2>
        <textarea id="raw-text" placeholder="在此粘贴 Pages 内容..."></textarea>
        <button class="btn-main" onclick="importPaste()">粘贴导入并开始</button>
        
        <div class="file-grid">
            <label for="pdf-input" class="btn-sec">导入 PDF</label>
            <label for="doc-input" class="btn-sec">导入 Word</label>
        </div>
        <input type="file" id="pdf-input" style="display:none" accept=".pdf" onchange="parsePDF(this.files[0])">
        <input type="file" id="doc-input" style="display:none" accept=".docx" onchange="parseDOC(this.files[0])">

        <button class="btn-main" style="background:none; color:#5c6370; margin-top:20px; border:none;" onclick="useCache()">使用缓存数据继续</button>
        <div id="debug-log" style="color:var(--red); font-size:0.6rem; margin-top:10px;"></div>
    </div>
</div>

<div id="app">
    <div class="progress"><div id="bar-fill"></div></div>
    <div id="word-area">
        <div id="word-text">---</div>
        <div id="hint-text">Waiting</div>
    </div>
    <div class="opts-grid" id="btns"></div>
    <input type="text" id="spell-box" placeholder="TYPE & ENTER" autocomplete="off" autocapitalize="off">
    <button class="btn-main" style="background:none; color:#4b5263; letter-spacing:3px; font-size:0.65rem;" onclick="archiveCurrent()">ARCHIVE CURRENT</button>
</div>

<div id="modal-list" class="modal-full">
    <div class="close-btn" onclick="this.parentElement.style.display='none'">✕</div>
    <h2 id="list-title" style="color:var(--blue); font-weight:200; margin-bottom:20px;">LIST</h2>
    <div id="list-content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script>
    // 全局错误捕获
    window.onerror = function(m, s, l) { document.getElementById('debug-log').innerText = `Error: ${m} at line ${l}`; };

    let wordBank = [];
    try { wordBank = JSON.parse(localStorage.getItem('v28_data')) || []; } catch(e) { console.error("Cache corrupted"); }

    let circle = 1, curIdx = 0, errors = 0, isLock = false, isRandom = false;

    // UI 控制
    function openPanel(p) { document.getElementById('panel-'+p).classList.add('active'); }
    function closePanel(p) { document.getElementById('panel-'+p).classList.remove('active'); }
    function setCircle(n) { circle = n; curIdx = 0; errors = 0; closePanel('left'); update(); }
    function toggleRandom() { isRandom = !isRandom; document.getElementById('rand-status').innerText = isRandom ? "ON" : "OFF"; if(isRandom) shuffle(); curIdx = 0; update(); }

    // 导入
    function importPaste() { const t = document.getElementById('raw-text').value; build(t.split('\n').map(l=>l.trim()).filter(l=>l)); }
    
    async function parsePDF(file) {
        if(!file) return;
        try {
            if(typeof pdfjsLib === 'undefined') throw new Error("PDF Library not loaded");
            const buf = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(buf).promise;
            let lines = [];
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                let yMap = {};
                content.items.forEach(it => {
                    let y = Math.round(it.transform[5]);
                    if(!yMap[y]) yMap[y] = [];
                    yMap[y].push({x: it.transform[4], s: it.str});
                });
                Object.keys(yMap).sort((a,b)=>b-a).forEach(y => {
                    let s = yMap[y].sort((a,b)=>a.x-b.x).map(it=>it.s).join(' ').trim();
                    if(s) lines.push(s);
                });
            }
            build(lines);
        } catch(e) { alert(e.message); }
    }

    function parseDOC(file) {
        if(!file) return;
        try {
            if(typeof mammoth === 'undefined') throw new Error("Word Library not loaded");
            file.arrayBuffer().then(buf => { mammoth.extractRawText({arrayBuffer: buf}).then(r => build(r.value.split('\n').filter(l=>l.trim()))); });
        } catch(e) { alert(e.message); }
    }

    function build(lines) {
        let res = [];
        for(let i=0; i<lines.length; i+=2) if(lines[i+1]) res.push({w: lines[i], d: lines[i+1], arc: false});
        wordBank = res;
        localStorage.setItem('v28_data', JSON.stringify(wordBank));
        useCache();
    }

    function useCache() { 
        if(wordBank.length > 0) { 
            document.getElementById('import-center').style.display='none'; 
            document.getElementById('app').style.visibility='visible';
            update(); 
        } else {
            document.getElementById('import-center').style.display='flex';
            document.getElementById('app').style.visibility='hidden';
        }
    }

    function resetApp() { if(confirm("确定清空数据？")) { localStorage.clear(); location.reload(); } }

    function shuffle() {
        let arc = wordBank.filter(w => w.arc);
        let act = wordBank.filter(w => !w.arc).sort(() => Math.random() - 0.5);
        wordBank = [...act, ...arc];
    }

    function update() {
        let active = wordBank.filter(w => !w.arc);
        if(active.length === 0) { document.getElementById('word-text').innerText = "DONE"; return; }
        if(curIdx >= active.length) { checkEnd(); return; }

        document.querySelectorAll('.panel-item').forEach(p => p.classList.remove('active'));
        if(document.getElementById('m'+circle)) document.getElementById('m'+circle).classList.add('active');

        const item = active[curIdx];
        document.getElementById('bar-fill').style.width = (curIdx / active.length * 100) + "%";
        document.getElementById('btns').style.display = 'none';
        document.getElementById('spell-box').style.display = 'none';

        if(circle === 1) {
            document.getElementById('word-text').innerText = item.w;
            document.getElementById('hint-text').innerText = "IDENTIFY (C1)";
            document.getElementById('btns').style.display = 'grid';
            renderOpts(item.d, 'd', active);
        } else if(circle === 2) {
            document.getElementById('word-text').innerText = item.d;
            document.getElementById('hint-text').innerText = "RECALL (C2)";
            document.getElementById('btns').style.display = 'grid';
            renderOpts(item.w, 'w', active);
        } else {
            document.getElementById('word-text').innerText = item.d;
            document.getElementById('hint-text').innerText = "SPELLING (C3)";
            const s = document.getElementById('spell-box'); s.style.display = 'block'; s.value = "";
        }
    }

    function renderOpts(corr, key, pool) {
        let opts = [corr];
        while(opts.length < 4 && opts.length < pool.length) {
            let r = pool[Math.floor(Math.random()*pool.length)][key];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        const area = document.getElementById('btns'); area.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = 'choice'; b.innerText = o;
            b.onclick = () => { if(!isLock) { if(o === corr) { b.classList.add('correct'); move(true); } else move(false); } };
            area.appendChild(b);
        });
    }

    document.getElementById('spell-box').onkeydown = e => { if(e.key === 'Enter' && !isLock) { if(e.target.value.trim().toLowerCase() === wordBank.filter(w=>!w.arc)[curIdx].w.toLowerCase()) move(true); else move(false); } };

    function move(ok) {
        isLock = true; if(!ok) errors++;
        setTimeout(() => {
            if(ok) curIdx++; else alert("Correct: " + wordBank.filter(w => !w.arc)[curIdx].w);
            isLock = false; checkEnd();
        }, 300);
    }

    function checkEnd() {
        let active = wordBank.filter(w => !w.arc);
        if(curIdx >= active.length && active.length > 0) {
            if(errors === 0) { circle++; curIdx = 0; if(isRandom) shuffle(); alert("Circle Clear!"); }
            else { curIdx = 0; errors = 0; alert("Restarting Circle..."); }
        }
        update();
    }

    function archiveCurrent() {
        let active = wordBank.filter(w => !w.arc);
        if(active[curIdx]) {
            wordBank.find(w => w.w === active[curIdx].w).arc = true;
            localStorage.setItem('v28_data', JSON.stringify(wordBank));
            update();
        }
    }

    function showList(type) {
        closePanel('right');
        document.getElementById('modal-list').style.display = 'flex';
        let data = (type==='all') ? wordBank : wordBank.filter(w=>w.arc);
        document.getElementById('list-title').innerText = (type==='all') ? "FULL LIST" : "ARCHIVE";
        document.getElementById('list-content').innerHTML = data.map(w => `<div class="list-row"><b>${w.w}</b><span>${w.d}</span></div>`).join('');
    }

    // 初始化检查
    window.onload = useCache;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>DANTAHIBOU V44</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root { 
            --bg: #000; --app-bg: #161b22; --text: #abb2bf;
            --blue: #61afef; --green: #98c379; --red: #ff4444; --border: #30363d;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .wrapper { width: 100%; max-width: 800px; margin: 0 auto; position: relative; display: flex; flex-direction: column; height: 100%; }

        header {
            padding-top: calc(var(--safe-top) + 15px); padding-left: 20px; padding-right: 20px; padding-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(13, 17, 23, 0.9); border-bottom: 1px solid var(--border);
            flex-shrink: 0; z-index: 200; backdrop-filter: blur(10px);
        }
        .icon-btn { color: var(--text); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: color 0.2s; }
        .icon-btn:hover { color: #fff; }
        
        .repo-icon { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; }
        .repo-icon span { display: block; height: 2px; background: currentColor; border-radius: 1px; transition: 0.2s; }
        .repo-icon span:nth-child(1) { width: 16px; }
        .repo-icon span:nth-child(2) { width: 10px; }
        .repo-icon span:nth-child(3) { width: 14px; }

        .side-panel {
            position: fixed; top: 0; bottom: 0; background: rgba(0,0,0,0.95);
            z-index: 5000; display: none; flex-direction: column; padding: 60px 25px; backdrop-filter: blur(15px);
        }
        .side-panel.active { display: flex; }
        .panel-item { padding: 22px 0; border-bottom: 1px solid var(--border); font-size: 1.05rem; color: #fff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: color 0.2s; }
        .panel-item:hover { color: var(--blue); }
        .panel-item.active { color: var(--blue); font-weight: bold; }
        .close-btn { position: absolute; top: 30px; right: 25px; font-size: 2rem; color: #5c6370; padding: 10px; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: #fff; }

        #main-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 20px 20px 120px 20px; position: relative; }
        
        .word-header { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0 10px; }
        #word-text { font-size: 2.2rem; font-weight: 200; color: #fff; text-align: center; line-height: 1.2; word-wrap: break-word; transition: color 0.15s ease-in-out; }
        #fav-btn { font-size: 1.8rem; cursor: pointer; color: #5c6370; transition: color 0.2s, transform 0.2s; user-select: none; display: none; }
        #fav-btn:active { transform: scale(1.3); }
        
        #hint-text { font-size: 0.75rem; color: #5c6370; text-align: center; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 35px; }

        .opts-grid { display: grid; gap: 15px; width: 100%; margin-bottom: 30px; }
        button.choice { background: var(--app-bg); color: var(--text); border: 1px solid var(--border); padding: 20px 15px; font-size: 1rem; border-radius: 12px; text-align: left; line-height: 1.4; cursor: pointer; transition: all 0.2s; }
        button.choice:hover { border-color: var(--blue); background: #1c2128; }
        button.choice.correct { background: var(--green) !important; color: #000 !important; font-weight: bold; border-color: var(--green) !important; }
        button.choice.wrong-shake { animation: shake 0.4s; border-color: var(--red) !important; color: var(--red) !important; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .input-box { background: rgba(0,0,0,0.5); border: none; border-bottom: 2px solid var(--blue); color: #fff; font-size: 1.5rem; text-align: center; width: 100%; padding: 15px 0; display: none; margin-bottom: 20px; transition: border-color 0.2s; }
        .input-box:focus { border-color: var(--green); }
        #roleplay-box { font-size: 1.1rem; text-align: left; height: 120px; resize: none; padding: 15px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit;}

        footer {
            position: fixed; bottom: 0; left: 0; right: 0; width: 100%; max-width: 800px; margin: 0 auto;
            background: #0d1117; border-top: 1px solid var(--border);
            padding-bottom: calc(var(--safe-bottom) + 15px); padding-top: 15px; display: flex; justify-content: center; gap: 80px; z-index: 300;
        }
        .footer-btn { background: none; border: none; color: #5c6370; font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; padding: 10px; cursor: pointer; transition: color 0.2s; }
        .footer-btn:hover { color: #fff; }

        .progress { position: fixed; top: calc(var(--safe-top) + 70px); left: 0; width: 100%; height: 2px; background: #000; z-index: 150; }
        #bar-fill { height: 100%; background: var(--blue); width: 0%; transition: 0.4s; }

        #import-center { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; }
        textarea.paste-area { width: 100%; max-width: 600px; height: 180px; background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 20px; border-radius: 12px; font-size: 1.05rem; margin-bottom: 20px; resize: none; font-family: inherit;}
        .btn-main { background: var(--blue); color: #000; border: none; padding: 18px; width: 100%; max-width: 400px; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: opacity 0.2s; }
        .btn-main:hover { opacity: 0.8; }
        .file-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; width: 100%; max-width: 400px; }
        .btn-sec { background: #333; color: #fff; border: none; padding: 15px; border-radius: 10px; font-size: 0.9rem; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .btn-sec:hover { background: #444; }
        
        .modal-full { position: fixed; inset: 0; background: var(--bg); z-index: 6000; display: none; flex-direction: column; padding: 60px 20px; overflow-y: auto; }
        .list-row { padding: 18px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .restore-btn { background: none; border: none; color: #5c6370; padding: 10px; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .restore-btn:hover { color: var(--red); }

        /* V44: 电影级克制报错弹窗 (HUD 风格) */
        #toast-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(13, 17, 23, 0.95); /* 深邃暗调背景 */
            color: var(--red); font-weight: 300; letter-spacing: 5px; font-size: 0.85rem;
            padding: 12px 28px; border-radius: 8px; /* 极简微圆角 */
            border: 1px solid rgba(255, 68, 68, 0.6); /* 高反差警示边框 */
            z-index: 10000; box-shadow: 0 6px 20px rgba(255, 68, 68, 0.15); /* 微弱红色辉光 */
            backdrop-filter: blur(10px);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            pointer-events: none; display: flex; align-items: center; gap: 10px;
        }
        #toast-alert.show { top: calc(var(--safe-top) + 85px); }
        .toast-icon { font-size: 1.1rem; font-weight: bold; }

        @media (max-width: 767px) { .side-panel { left: 0; right: 0; } }
        @media (min-width: 768px) {
            #word-text { font-size: 2.8rem; } 
            #panel-left { left: 0; right: auto; width: 380px; border-right: 1px solid var(--border); }
            #panel-right { right: 0; left: auto; width: 420px; border-left: 1px solid var(--border); }
            .opts-grid { grid-template-columns: 1fr 1fr; }
            .modal-full { padding: 80px 20%; }
        }
    </style>
</head>
<body>

<div id="toast-alert">
    <span class="toast-icon">✕</span> WRONG
</div>

<div class="wrapper">
    <header>
        <div class="icon-btn" style="font-size: 1.5rem;" onclick="openPanel('left')">☰</div>
        <div style="font-size: 0.85rem; font-weight: bold; letter-spacing: 3px; color: var(--blue); text-transform: uppercase;">DANTAHIBOU</div>
        <div class="icon-btn" onclick="openPanel('right')"><div class="repo-icon"><span></span><span></span><span></span></div></div>
    </header>

    <div class="progress"><div id="bar-fill"></div></div>

    <main id="main-container">
        <div class="word-header">
            <div id="word-text">---</div>
            <div id="fav-btn" onclick="toggleFavCurrent()">☆</div>
        </div>
        <div id="hint-text">Waiting</div>
        <div class="opts-grid" id="btns"></div>
        <input type="text" id="spell-box" class="input-box" placeholder="TYPE & ENTER" autocomplete="off" autocapitalize="off">
        <textarea id="roleplay-box" class="input-box" placeholder="Write a sentence using this term..."></textarea>
        <button id="submit-rp" class="btn-main" style="display:none; margin: 15px auto 0; max-width: 200px;" onclick="move(true)">SUBMIT</button>
    </main>

    <footer>
        <button class="footer-btn" onclick="skip()">SKIP</button>
        <button class="footer-btn" onclick="archiveCurrent()" style="color:var(--blue)">ARCHIVE</button>
    </footer>
</div>

<div id="panel-left" class="side-panel">
    <div class="close-btn" onclick="closePanel('left')">✕</div>
    <h3 style="color:var(--blue); font-weight: 200; margin-bottom: 30px; text-transform: uppercase;">Set Mode</h3>
    <div class="panel-item" onclick="setCircle(1)" id="m1">Circle 1: 识别识别 (Word→Def)</div>
    <div class="panel-item" onclick="setCircle(2)" id="m2">Circle 2: 回想回想 (Def→Word)</div>
    <div class="panel-item" onclick="setCircle(3)" id="m3">Circle 3: 拼写拼写 (Perfect)</div>
    <div class="panel-item" onclick="setCircle(4)" id="m4">Circle 4: 实战实战 (Role-play)</div>
    
    <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 10px;">
        <div class="panel-item" onclick="toggleRandom()">随机模式 <span id="rand-status" style="color:#5c6370">OFF</span></div>
        <div class="panel-item" onclick="toggleFavMode()">收藏训练 <span id="fav-status" style="color:#5c6370">OFF</span></div>
    </div>
</div>

<div id="panel-right" class="side-panel">
    <div class="close-btn" onclick="closePanel('right')">✕</div>
    <h3 style="color:var(--blue); font-weight: 200; margin-bottom: 30px; text-transform: uppercase;">Library</h3>
    <div class="panel-item" onclick="showList('all')">全量清单 (Full List)</div>
    <div class="panel-item" onclick="showList('arc')">归档仓库 (Archive)</div>
    <div class="panel-item" onclick="resetApp()" style="color:var(--red); border:none; margin-top:50px; text-transform: uppercase;">重置数据 Reset</div>
</div>

<div id="import-center">
    <h1 style="font-weight: 200; margin-bottom: 30px; color:#fff; letter-spacing: 4px;">DANTAHIBOU</h1>
    <textarea id="raw-text" class="paste-area" placeholder="粘贴单词本内容..."></textarea>
    <button class="btn-main" onclick="importPaste()">导入并开始</button>
    <div class="file-grid">
        <label for="p-in" class="btn-sec">PDF 导入</label>
        <label for="d-in" class="btn-sec">Word 导入</label>
    </div>
    <input type="file" id="p-in" style="display:none" accept=".pdf" onchange="parsePDF(this.files[0])">
    <input type="file" id="d-in" style="display:none" accept=".docx" onchange="parseDOC(this.files[0])">
    <button class="btn-main" style="background:none; color:#5c6370; border:none; font-size: 0.85rem; margin-top: 20px;" onclick="useCache()">使用上次缓存</button>
</div>

<div id="modal-list" class="modal-full">
    <div class="close-btn" onclick="this.parentElement.style.display='none'">✕</div>
    <div style="max-width: 800px; margin: 0 auto; width: 100%;">
        <h2 id="list-title" style="color:var(--blue); font-weight:200; margin-bottom: 30px;">LIST</h2>
        <div id="list-content"></div>
    </div>
</div>

<script>
    window.onerror = function() { document.getElementById('import-center').style.display='flex'; };

    // 数据迁移
    let wordBank = JSON.parse(localStorage.getItem('v44_data')) || JSON.parse(localStorage.getItem('v43_data')) || JSON.parse(localStorage.getItem('v42_data')) || [];
    wordBank.forEach(w => { if(typeof w.fav === 'undefined') w.fav = false; });

    let circle = 1, curIdx = 0, errors = 0, locked = false, isRandom = false, isFavMode = false;

    function openPanel(p) { document.getElementById('panel-'+p).classList.add('active'); }
    function closePanel(p) { document.getElementById('panel-'+p).classList.remove('active'); }
    function setCircle(n) { circle = n; curIdx = 0; errors = 0; closePanel('left'); update(); }
    
    function toggleRandom() { 
        isRandom = !isRandom; 
        document.getElementById('rand-status').innerText = isRandom ? "ON" : "OFF"; 
        document.getElementById('rand-status').style.color = isRandom ? "var(--blue)" : "#5c6370";
        if(isRandom) shuffle(); curIdx = 0; update(); 
    }

    function toggleFavMode() {
        isFavMode = !isFavMode;
        document.getElementById('fav-status').innerText = isFavMode ? "ON" : "OFF";
        document.getElementById('fav-status').style.color = isFavMode ? "var(--blue)" : "#5c6370";
        curIdx = 0; closePanel('left'); update();
    }

    function toggleFavCurrent() {
        let pool = isFavMode ? wordBank.filter(w => !w.arc && w.fav) : wordBank.filter(w => !w.arc);
        if(!pool[curIdx]) return;
        let actualWord = wordBank.find(w => w.w === pool[curIdx].w);
        actualWord.fav = !actualWord.fav;
        localStorage.setItem('v44_data', JSON.stringify(wordBank));
        updateFavIcon(actualWord.fav);
    }

    function updateFavIcon(isFav) {
        const btn = document.getElementById('fav-btn');
        btn.innerText = isFav ? "★" : "☆";
        btn.style.color = isFav ? "var(--blue)" : "#5c6370";
    }

    function importPaste() { const raw = document.getElementById('raw-text').value.trim(); if(!raw) return; build(raw.split('\n').map(l=>l.trim()).filter(l=>l)); }
    async function parsePDF(file) {
        if(!file) return;
        try {
            const buf = await file.arrayBuffer(); const pdf = await pdfjsLib.getDocument(buf).promise; let lines = [];
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i); const content = await page.getTextContent(); let yMap = {};
                content.items.forEach(it => {
                    let text = it.str.trim(); if(!text) return; 
                    let y = Math.round(it.transform[5]); let matchedY = Object.keys(yMap).find(k => Math.abs(k - y) <= 5);
                    if (matchedY) yMap[matchedY].push({x: it.transform[4], s: text}); else yMap[y] = [{x: it.transform[4], s: text}];
                });
                Object.keys(yMap).sort((a,b)=>b-a).forEach(y => lines.push(yMap[y].sort((a,b)=>a.x-b.x).map(it=>it.s).join(' ').trim()));
            }
            build(lines);
        } catch(e) { alert("PDF 解析错误。"); }
    }
    function parseDOC(file) { if(!file) return; file.arrayBuffer().then(buf => mammoth.extractRawText({arrayBuffer: buf}).then(r => build(r.value.split('\n').filter(l=>l.trim())))); }

    function build(lines) {
        let res = [];
        for(let i=0; i<lines.length; i+=2) if(lines[i+1]) res.push({w: lines[i], d: lines[i+1], arc: false, fav: false});
        wordBank = res; localStorage.setItem('v44_data', JSON.stringify(wordBank)); useCache();
    }

    function useCache() { if(wordBank.length > 0) { document.getElementById('import-center').style.display='none'; update(); } }
    function resetApp() { if(confirm("此操作不可逆，重置所有数据？")) { localStorage.clear(); location.reload(); } }
    function shuffle() { let act = wordBank.filter(w => !w.arc).sort(() => Math.random() - 0.5); let arc = wordBank.filter(w => w.arc); wordBank = [...act, ...arc]; }

    function showToast() {
        const t = document.getElementById('toast-alert'); t.classList.add('show'); locked = true;
        setTimeout(() => { t.classList.remove('show'); locked = false; }, 1200);
    }

    function getPool() { return isFavMode ? wordBank.filter(w => !w.arc && w.fav) : wordBank.filter(w => !w.arc); }

    function update() {
        let pool = getPool();
        if(pool.length === 0) { 
            document.getElementById('word-text').innerText = isFavMode ? "NO FAVORITES" : "ALL CLEAR"; 
            document.getElementById('fav-btn').style.display = 'none';
            document.getElementById('btns').style.display = 'none';
            document.getElementById('spell-box').style.display = 'none';
            document.getElementById('roleplay-box').style.display = 'none';
            document.getElementById('submit-rp').style.display = 'none';
            return; 
        }
        document.getElementById('fav-btn').style.display = 'block';
        if(curIdx >= pool.length) { checkEnd(); return; }

        document.querySelectorAll('.panel-item').forEach(p => p.classList.remove('active'));
        if(document.getElementById('m'+circle)) document.getElementById('m'+circle).classList.add('active');

        const item = pool[curIdx];
        document.getElementById('bar-fill').style.width = (curIdx / pool.length * 100) + "%";
        
        updateFavIcon(item.fav);
        
        document.getElementById('btns').style.display = 'none';
        document.getElementById('spell-box').style.display = 'none';
        document.getElementById('roleplay-box').style.display = 'none';
        document.getElementById('submit-rp').style.display = 'none';
        document.getElementById('main-container').scrollTop = 0;

        if(circle === 1) {
            document.getElementById('word-text').innerText = item.w;
            document.getElementById('hint-text').innerText = "C1: Identify";
            document.getElementById('btns').style.display = 'grid';
            renderOpts(item.d, 'd', pool);
        } else if(circle === 2) {
            document.getElementById('word-text').innerText = item.d;
            document.getElementById('hint-text').innerText = "C2: Recall";
            document.getElementById('btns').style.display = 'grid';
            renderOpts(item.w, 'w', pool);
        } else if(circle === 3) {
            document.getElementById('word-text').innerText = item.d;
            document.getElementById('hint-text').innerText = "C3: Spelling";
            const s = document.getElementById('spell-box'); s.style.display = 'block'; s.value = ""; s.focus();
        } else if(circle === 4) {
            document.getElementById('word-text').innerText = item.w;
            document.getElementById('hint-text').innerText = "C4: Role-play";
            const r = document.getElementById('roleplay-box'); r.style.display = 'block'; r.value = ""; r.focus();
            document.getElementById('submit-rp').style.display = 'block';
        }
    }

    function renderOpts(corr, key, pool) {
        let opts = [corr];
        let safetyPool = wordBank.filter(w => !w.arc); 
        while(opts.length < 4 && opts.length < safetyPool.length) {
            let r = safetyPool[Math.floor(Math.random()*safetyPool.length)][key];
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);
        const area = document.getElementById('btns'); area.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = 'choice'; b.innerText = o;
            b.onclick = () => { 
                if(!locked) { 
                    if(o === corr) { b.classList.add('correct'); move(true); } 
                    else { b.classList.add('wrong-shake'); move(false); setTimeout(() => b.classList.remove('wrong-shake'), 400); } 
                } 
            };
            area.appendChild(b);
        });
    }

    document.getElementById('spell-box').onkeydown = e => { 
        if(e.key === 'Enter' && !locked) { 
            let pool = getPool();
            if(e.target.value.trim().toLowerCase() === pool[curIdx].w.toLowerCase()) move(true); 
            else move(false); 
        } 
    };

    function move(ok) {
        if(ok) {
            locked = true;
            const wt = document.getElementById('word-text');
            wt.style.color = "var(--green)";
            setTimeout(() => {
                wt.style.color = "#fff";
                curIdx++; 
                locked = false;
                checkEnd(); 
            }, 300);
        } 
        else { errors++; showToast(); } 
    }

    function checkEnd() {
        if(locked) return;
        let pool = getPool();
        if(curIdx >= pool.length && pool.length > 0) {
            if(errors === 0) { 
                if(circle < 4) circle++; else circle = 1; 
                curIdx = 0; if(isRandom) shuffle(); alert("Circle Cleared!"); 
            }
            else { curIdx = 0; errors = 0; alert("Requires 100% Accuracy. Restarting..."); }
        }
        update();
    }

    function skip() { if(!locked) { curIdx++; update(); } }
    
    function archiveCurrent() {
        let pool = getPool();
        if(pool[curIdx]) {
            wordBank.find(w => w.w === pool[curIdx].w).arc = true;
            localStorage.setItem('v44_data', JSON.stringify(wordBank));
            update();
        }
    }

    function restoreWord(wToRestore) {
        wordBank.find(w => w.w === wToRestore).arc = false;
        localStorage.setItem('v44_data', JSON.stringify(wordBank));
        showList('arc'); update(); 
    }

    function showList(type) {
        closePanel('right'); document.getElementById('modal-list').style.display = 'flex';
        let data = (type==='all') ? wordBank : wordBank.filter(w=>w.arc);
        document.getElementById('list-title').innerText = (type==='all') ? "FULL LIST" : "ARCHIVE";
        document.getElementById('list-content').innerHTML = data.map(w => `
            <div class="list-row">
                <div><b>${w.w}</b> ${w.fav ? '<span style="color:var(--blue)">★</span>' : ''}<br><span style="color:#5c6370; font-size:0.95rem;">${w.d}</span></div>
                ${type === 'arc' ? `<button class="restore-btn" onclick="restoreWord('${w.w}')">✕</button>` : ''}
            </div>
        `).join('');
    }

    window.onload = useCache;
</script>
</body>
</html>

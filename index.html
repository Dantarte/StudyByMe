            --blue: #61afef; --green: #98c379; --red: #e06c75; --border: #333;
            --safe-top: env(safe-area-inset-top);

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; touch-action: manipulation; }

            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border-bottom: 1px solid var(--border);
            z-index: 100;

        .menu-icon { font-size: 1.4rem; color: var(--text); cursor: pointer; padding: 5px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }

        /* 侧边弹出菜单 */

            padding: 80px 30px;

        .side-panel.active { display: flex; }
        .panel-item {

        }
        .panel-item:active { color: var(--blue); }
        .panel-item.active { color: var(--blue); font-weight: bold; }
        .close-btn { position: absolute; top: calc(var(--safe-top) + 20px); right: 25px; font-size: 1.8rem; color: #5c6370; padding: 10px; }

        textarea { width: 100%; height: 150px; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 1rem; }

        #app { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }
        #word-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #word-text { font-size: 2.5rem; font-weight: 200; color: #fff; text-align: center; margin-bottom: 10px; line-height: 1.2; }
        #hint-text { font-size: 0.75rem; color: #5c6370; letter-spacing: 3px; text-transform: uppercase; }

        .opts-grid { display: grid; gap: 12px; margin-bottom: 30px; }

        }

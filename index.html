<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mastery V26 - Pro Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root { 
            --bg: #000; --app-bg: #1e1e1e; --text: #abb2bf;
            --blue: #61afef; --green: #98c379; --red: #e06c75; --border: #333;
            --safe-top: env(safe-area-inset-top);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 顶部导航：左右分布 */
        header {
            padding-top: calc(var(--safe-top) + 15px);
            padding-left: 20px; padding-right: 20px; padding-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .menu-icon { font-size: 1.4rem; color: var(--text); cursor: pointer; padding: 5px; }

        /* 侧边弹出菜单 */
        .side-panel {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: none; flex-direction: column;
            padding: 60px 30px;
        }
        .side-panel.active { display: flex; }
        .panel-item { 
            padding: 20px 0; border-bottom: 1px solid var(--border);
            font-size: 1.1rem; color: #fff; display: flex; justify-content: space-between; align-items: center;
        }
        .panel-item.active { color: var(--blue); }
        .close-btn { position: absolute; top: calc(var(--safe-top) + 20px); right: 25px; font-size: 1.5rem; color: #5c6370; }

        /* 导入中心 (仅在无数据时显示) */
        #import-center { position: fixed; inset: 0; background: var(--bg); z-index: 2000; padding: 25px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        textarea { width: 100%; height: 200px; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 1rem; }
        .btn-main { background: var(--blue); color: #000; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 1rem; }

        /* 主练习区 */
        #app { flex: 1; display: flex; flex-direction: column; padding: 20px; position: relative; }
        #content-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #word-text { font-size: 2.5rem; font-weight: 200; color: #fff; text-align: center; margin-bottom: 10px; line-height: 1.2; transition: 0.3s; }
        #hint-text { font-size: 0.7rem; color: #5c6370; letter-spacing: 3px; text-transform: uppercase; }

        .opts-grid { display: grid; gap: 12px; margin-bottom: 30px; }
        button.choice { 
            background: var(--app-bg); color: var(--text); border: 1px solid var(--border); 
            padding: 22px 18px; font-size: 1.05rem; border-radius: 14px; text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        button.choice.correct { background: var(--green) !important; color: #000 !important; border-color: var(--green); }
        
        #spell-box { background: rgba(0,0,0,0.5); border: none; border-bottom: 2px solid var(--blue); color: #fff; font-size: 2rem; text-align: center; width: 100%; padding: 15px 0; display: none; margin-bottom: 40px; }

        .progress { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #111; }
        #bar-fill { height: 100%; background: var(--blue); width: 0%; transition: 0.5s; }

        /* 模态框：词库列表 */
        .modal-full { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto; }
        .list-row { padding: 15px 0; border-bottom: 1px solid var(--border); }
        .list-row b { display: block; color: var(--blue); margin-bottom: 5px; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <div class="menu-icon" onclick="openPanel('left')">☰</div>
    <div style="font-size: 0.7rem; letter-spacing: 2px; color: var(--blue);">MASTER PRO</div>
    <div class="menu-icon" onclick="openPanel('right')">📂</div>
</header>

<div id="panel-left" class="side-panel">
    <div class="close-btn" onclick="closePanel('left')">✕</div>
    <h3 style="color:var(--blue); font-weight: 200; margin-bottom: 30px;">模式选择</h3>
    <div class="panel-item" onclick="setCircle(1)" id="m1">Circle 1: 识别 (Word→Def)</div>
    <div class="panel-item" onclick="setCircle(2)" id="m2">Circle 2: 回想 (Def→Word)</div>
    <div class="panel-item" onclick="setCircle(3)" id="m3">Circle 3: 拼写 (Perfect)</div>
    <div class="panel-item" onclick="toggleRandom()">
        随机练习模式
        <span id="rand-status" style="color:var(--blue)">OFF</span>
    </div>
</div>

<div id="panel-right" class="side-panel">
    <div class="close-btn" onclick="closePanel('right')">✕</div>
    <h3 style="color:var(--blue); font-weight: 200; margin-bottom: 30px;">资源库</h3>
    <div class="panel-item" onclick="showList('all')">全量词库清单 (2260+)</div>
    <div class="panel-item" onclick="showList('arc')">已归档单词</div>
    <div class="panel-item" onclick="resetApp()" style="color:var(--red); border:none; margin-top:40px;">重置所有数据 ⚠</div>
</div>

<div id="import-center">
    <h2 style="font-weight: 200;">DATA <span style="color:var(--blue)">MASTER</span></h2>
    <textarea id="raw-text" placeholder="粘贴 Pages 内容..."></textarea>
    <button class="btn-main" onclick="importPaste()">开始内化训练</button>
    <div style="margin-top:20px; display:flex; gap:10px; width:100%;">
        <button class="btn-main" style="background:#333; color:#fff;" onclick="triggerFile('pdf')">导入 PDF</button>
        <button class="btn-main" style="background:#333; color:#fff;" onclick="triggerFile('doc')">导入 Word</button>
    </div>
    <button class="btn-main" style="background:none; color:#5c6370; margin-top:20px;" onclick="useCache()">使用缓存继续</button>
</div>

<div id="app">
    <div class="progress"><div id="bar-fill"></div></div>
    <div id="content-box">
        <div id="word-text">---</div>
        <div id="hint-text">Waiting</div>
    </div>
    <div class="opts-grid" id="btns"></div>
    <input type="text" id="spell-box" placeholder="TYPE & ENTER" autocomplete="off" autocapitalize="off">
    
    <button class="btn-main" style="background:none; color:#4b5263; letter-spacing:3px; font-size:0.7rem;" onclick="archiveCurrent()">ARCHIVE CURRENT</button>
</div>

<div id="modal-list" class="modal-full">
    <div class="close-btn" onclick="this.parentElement.style.display='none'">✕</div>
    <h2 id="list-title" style="color:var(--blue); font-weight:200;">LIST</h2>
    <div id="list-content"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let wordBank = JSON.parse(localStorage.getItem('v26_data')) || [];
    let circle = 1, curIdx = 0, errors = 0, isLock = false, isRandom = false;

    // --- UI 交互控制 ---
    function openPanel(p) { document.getElementById('panel-'+p).classList.add('active'); }
    function closePanel(p) { document.getElementById('panel-'+p).classList.remove('active'); }
    function setCircle(n) { circle = n; curIdx = 0; errors = 0; closePanel('left'); update(); }
    function toggleRandom() { 
        isRandom = !isRandom; 
        document.getElementById('rand-status').innerText = isRandom ? "ON" : "OFF";
        if(isRandom) shuffleBank();
        curIdx = 0; update();
    }

    // --- 数据导入 ---
    function importPaste() {
        const text = document.getElementById('raw-text').value;
        const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);
        build(lines);
    }
    function triggerFile(t) {
        const i = document.createElement('input'); i.type='file';
        i.onchange = e => { if(t==='pdf') parsePDF(e.target.files[0]); else parseDOC(e.target.files[0]); };
        i.click();
    }
    async function parsePDF(file) {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(buf).promise;
        let lines = [];

            const page = await pdf.getPage(i);
            const content = await page.getTextContent();

                let y = Math.round(it.transform[5]);
                if(!yMap[y]) yMap[y] = [];
                yMap[y].push({x: it.transform[4], s: it.str});
            });
            Object.keys(yMap).sort((a,b)=>b-a).forEach(y => {

                if(s)

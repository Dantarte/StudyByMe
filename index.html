<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mastery V25 - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root { 
            --bg: #000; --app-bg: #1e1e1e; --text: #abb2bf;
            --blue: #61afef; --green: #98c379; --red: #e06c75; --border: #333;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }

        /* 导入中心 */
        #import-center { position: fixed; inset: 0; background: var(--bg); z-index: 9999; padding: 25px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; }
        .card { width: 100%; max-width: 450px; background: var(--app-bg); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .upload-btn { background: var(--blue); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 1rem; margin-top: 10px; }
        textarea { width: 100%; height: 120px; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; margin-top: 10px; }

        /* 学习主界面 */
        #app { flex: 1; display: flex; flex-direction: column; position: relative; padding: 20px; }
        #word-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #word-text { font-size: 2.5rem; font-weight: 200; color: #fff; text-align: center; margin-bottom: 10px; line-height: 1.2; }
        #hint-text { font-size: 0.75rem; color: #5c6370; letter-spacing: 2px; text-transform: uppercase; }

        /* 选项与交互 */
        .opts-grid { display: grid; gap: 10px; margin-bottom: 20px; }
        button.choice { 
            background: var(--app-bg); color: var(--text); border: 1px solid var(--border); 
            padding: 20px 15px; font-size: 1rem; border-radius: 10px; text-align: left;
            transition: 0.1s;
        }
        button.choice.correct { background: var(--green) !important; color: #000 !important; border-color: var(--green); }
        #spell-box { background: rgba(0,0,0,0.5); border: none; border-bottom: 2px solid var(--blue); color: #fff; font-size: 1.8rem; text-align: center; width: 100%; padding: 15px 0; display: none; margin-bottom: 30px; }

        /* 底部操作 */
        #bottom-nav { 
            background: var(--app-bg); border-top: 1px solid var(--border);
            padding-bottom: calc(env(safe-area-inset-bottom) + 10px);
            padding-top: 10px; display: flex; justify-content: space-around;
        }
        .nav-item { background: none; border: none; color: #5c6370; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--blue); }

        .progress { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #111; }
        #bar-fill { height: 100%; background: var(--blue); width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

<div id="import-center">
    <h2 style="font-weight: 200; margin-top: 40px;">VOCAB <span style="color:var(--blue)">PRO V25</span></h2>
